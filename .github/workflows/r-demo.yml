name: R demo

on:
  push:
  pull_request:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install packages
        run: Rscript scripts/install_packages.R
      - name: Run synthetic demo
        run: Rscript run_pipeline.R --root . --mode distance --nsim 3 --seed 1 --skip_figures
